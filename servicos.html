<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mentoria - Workspaceti</title>

<!-- Favicon -->
<link rel="icon" type="image/x-icon" href="img/favicon.ico">

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Font Awesome -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<!-- Fonte -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

/* RESET */
* {
    box-sizing: border-box;
}

body {
    font-family: 'Poppins', sans-serif;
    margin: 0;
    color: white;
    background: radial-gradient(circle at top, #133b5c, #0b1f33 70%);
    overflow-x: hidden;
}

/* FUNDO */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: radial-gradient(circle, rgba(0,212,255,0.12) 1px, transparent 1px);
    background-size: 40px 40px;
    animation: bgMove 20s linear infinite;
    z-index: -1;
}

@keyframes bgMove {
    from { transform: translate(0,0); }
    to { transform: translate(-200px,-200px); }
}

/* PARTICULAS */
#tsparticles {
    position: fixed;
    width: 100%;
    height: 100%;
    z-index: -2;
}

/* CONTAINER */
.main-box {
    max-width: 480px;
    width: 100%;
    margin: auto;
    padding: 20px;
}

/* VOLTAR */
.btn-back {
    position: fixed;
    top: 14px;
    left: 14px;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    color: white;
    border: 1px solid #00d4ff;
    display: flex;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(10px);
    font-size: 18px;
    text-decoration: none;
}

/* LOGO */
.logo {
    width: 100px;
    border-radius: 50%;
    margin-bottom: 10px;
    box-shadow: 0 0 20px #00d4ff;
}

/* HEADER */
.header {
    text-align: center;
    margin-bottom: 20px;
}

/* ✅ CARD ESTILO SERVIÇOS */
.card-mentoria {
    width: 100%;
    margin: 10px 0;
    padding: 14px;
    border-radius: 28px;
    border: 1px solid #00d4ff;
    background: rgba(28,93,133,0.25);
    cursor: pointer;
    transition: 0.3s;
    text-align: left;
    display: flex;
    align-items: center;
    gap: 10px;
}

.card-mentoria:hover {
    background: #00d4ff;
    color: #0b1f33;
}

.card-mentoria.active {
    background: #00d4ff;
    color: #0b1f33;
    box-shadow: 0 0 20px #00d4ff;
}

.card-mentoria i {
    font-size: 16px;
}

.card-mentoria .texto {
    font-size: 14px;
}

.card-mentoria .texto small {
    display: block;
    font-size: 12px;
    opacity: 0.8;
}

/* BOTÃO WHATS */
.btn-whats {
    margin-top: 25px;
    display: block;
    padding: 14px;
    border-radius: 30px;
    background: #25d366;
    color: white;
    text-decoration: none;
    text-align: center;
    font-weight: 600;
}

/* FOOTER */
.footer {
    margin-top: 15px;
    font-size: 12px;
    opacity: 0.6;
    text-align: center;
}

/* RESPONSIVO */
@media (max-width: 576px) {

    .main-box {
        padding: 15px;
    }

    .logo {
        width: 80px;
    }

    h5 {
        font-size: 16px;
    }

    p {
        font-size: 13px;
    }
}

</style>
</head>

<body>

<div id="tsparticles"></div>

<a href="index.html" class="btn-back">←</a>

<div class="container-fluid d-flex justify-content-center align-items-center min-vh-100">
    <div class="main-box">

        <div class="header">
            <img src="img/logo.png" class="logo">
            <h5>Mentoria Workspaceti</h5>
            <p>Transforme sua carreira com estratégia</p>
        </div>

        <!-- CARDS -->
        <div>

            <div class="card-mentoria" onclick="ativarCard(this, 'transicao.html')">
                <i class="fas fa-arrow-right"></i>
                <div class="texto">
                    Iniciantes
                    <small>Primeira vaga da estratégia à contratação</small>
                </div>
            </div>

            <div class="card-mentoria" onclick="ativarCard(this, 'crescimento.html')">
                <i class="fas fa-chart-line"></i>
                <div class="texto">
                    Crescimento
                    <small>Evolua na carreira com direção</small>
                </div>
            </div>

            <div class="card-mentoria" onclick="ativarCard(this, 'automacao.html')">
                <i class="fas fa-cogs"></i>
                <div class="texto">
                    Automação
                    <small>Ganhe produtividade e destaque</small>
                </div>
            </div>

            <div class="card-mentoria" onclick="ativarCard(this, 'posicionamento.html')">
                <i class="fas fa-user-tie"></i>
                <div class="texto">
                    Posicionamento
                    <small>LinkedIn, CV e entrevistas</small>
                </div>
            </div>

        </div>

        <!-- BOTÃO -->
        <a href="https://wa.me/558192651174" class="btn-whats">
            💬 Agendar Mentoria
        </a>

        <div class="footer">
            © 2026 Workspaceti
        </div>

    </div>
</div>

<script>
function ativarCard(element, destino){

    const cards = document.querySelectorAll('.card-mentoria');

    cards.forEach(c => c.classList.remove('active'));

    element.classList.add('active');

    setTimeout(() => {
        window.location.href = destino;
    }, 200);
}
</script>

<script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>

<script>
tsParticles.load("tsparticles", {
    particles: {
        number: { value: 60 },
        color: { value: "#00d4ff" },
        links: { enable: true, color: "#00d4ff" },
        move: { enable: true, speed: 1 }
    }
});
</script>

</body>
</html>
