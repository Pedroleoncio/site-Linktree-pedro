<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mentoria - Workspaceti</title>

<!-- Favicon -->
<link rel="icon" type="image/x-icon" href="img/favicon.ico">

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Font Awesome -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<!-- Fonte -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Poppins', sans-serif;
    margin: 0;
    color: white;
    overflow-x: hidden;
    background: linear-gradient(180deg, #0b1f33, #133b5c);
}

/* PARTICULAS */
#tsparticles {
    position: fixed;
    width: 100%;
    height: 100%;
    z-index: -1;
}

/* CONTAINER */
.main-box {
    max-width: 480px;
    width: 100%;
}

/* LOGO */
.logo {
    width: 100px;
    border-radius: 50%;
    margin-bottom: 10px;
}

/* HEADER */
.header {
    text-align: center;
    margin-bottom: 20px;
}

/* CARDS */
.card-custom {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    background: #1c5d85;
    border-radius: 15px;
    padding: 15px;
    transition: 0.3s;
    cursor: pointer;
}

.card-custom:hover {
    background: #f4c542;
    color: #0b1f33;
    transform: translateY(-3px);
}

.card-icon {
    font-size: 18px;
    margin-top: 3px;
}

.card-content h5 {
    font-size: 15px;
    margin: 0;
}

.card-content p {
    font-size: 13px;
    margin: 2px 0 0 0;
    opacity: 0.85;
}

/* BOTÃO */
.btn-whatsapp {
    display: block;
    background: #25D366;
    padding: 12px;
    border-radius: 25px;
    width: 100%;
    font-weight: 600;
    color: white;
    text-decoration: none;
    text-align: center;
    margin-top: 15px;
}

/* VOLTAR */
.btn-back {
    background: transparent;
    border: none;
    color: #0cc3e7;
    font-size: 14px;
    text-decoration: underline;
    margin-bottom: 10px;
    cursor: pointer;
}

/* FOOTER */
.footer {
    margin-top: 15px;
    font-size: 12px;
    opacity: 0.6;
    text-align: center;
}

/* RESPONSIVO */
@media (max-width: 576px) {
    .main-box {
        padding: 15px;
    }

    .logo {
        width: 80px;
    }

    .card-custom {
        padding: 12px;
    }
}
</style>
</head>

<body>

<div id="tsparticles"></div>

<div class="container-fluid d-flex justify-content-center align-items-center min-vh-100">
    <div class="main-box">

        <button onclick="voltarPagina()" class="btn-back">
            <i class="fas fa-arrow-left"></i> Voltar
        </button>

        <div class="header">
            <img src="img/logo.png" class="logo">
            <h5>Mentoria Workspaceti</h5>
            <p>Transforme sua carreira com estratégia</p>
        </div>

        <div class="d-grid gap-2">

            <div class="card-custom" onclick="location.href='transicao.html'">
                <i class="fas fa-arrow-right card-icon"></i>
                <div class="card-content">
                    <h5>Iniciantes</h5>
                    <p>Primeira vaga da estratégia à contratação.</p>
                </div>
            </div>

            <div class="card-custom" onclick="location.href='crescimento.html'">
                <i class="fas fa-arrow-right card-icon"></i>
                <div class="card-content">
                    <h5>Crescimento</h5>
                    <p>Evolua na carreira com direção.</p>
                </div>
            </div>

            <div class="card-custom" onclick="location.href='automacao.html'">
                <i class="fas fa-arrow-right card-icon"></i>
                <div class="card-content">
                    <h5>Automação</h5>
                    <p>Ganhe produtividade e destaque.</p>
                </div>
            </div>

            <div class="card-custom" onclick="location.href='posicionamento.html'">
                <i class="fas fa-user-tie card-icon"></i>
                <div class="card-content">
                    <h5>Posicionamento</h5>
                    <p>LinkedIn, CV e entrevistas.</p>
                </div>
            </div>

        </div>

        <a href="https://wa.me/558192651174" class="btn-whatsapp">
            <i class="fab fa-whatsapp"></i> Agendar Mentoria
        </a>

        <div class="footer">
            © 2026 Workspaceti
        </div>

    </div>
</div>

<script>
function voltarPagina() {
    if (window.history.length > 1) {
        window.history.back();
    } else {
        window.location.href = "index.html";
    }
}
</script>

<script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>

<script>
tsParticles.load("tsparticles", {
    particles: {
        number: { value: 60 },
        color: { value: "#00d4ff" },
        links: { enable: true, color: "#00d4ff" },
        move: { enable: true, speed: 1 }
    }
});
</script>

</body>
</html>
